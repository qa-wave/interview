openapi: 3.0.3
info:
  title: Candidates REST API
  version: 1.0.0
  description: Správa kandidátů — vyhledávání a detail
servers:
  - url: http://localhost:4010
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.CEPS-HUB-INTERVIEW-2026"
paths:
  /rest/candidates:
    get:
      summary: Search candidates
      description: Vyhledání kandidátů podle emailu nebo skillu.
      parameters:
        - in: query
          name: email
          schema:
            type: string
          description: Filtr podle emailu (přesná shoda)
        - in: query
          name: skill
          schema:
            type: string
          description: Filtr podle skillu (case-insensitive)
      responses:
        "200":
          description: List of matching candidates
  /rest/candidates/{id}:
    get:
      summary: Get candidate detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: CAND-001
      responses:
        "200":
          description: Candidate detail
        "404":
          description: Candidate not found
