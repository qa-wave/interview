openapi: 3.0.3
info:
  title: Interviews REST API
  version: 1.0.0
  description: Správa pohovorů — vytvoření, změna statusu, hodnocení. Vyžaduje candidateId z Candidates API.
servers:
  - url: http://localhost:4010
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.CEPS-HUB-INTERVIEW-2026"
paths:
  /rest/interviews:
    get:
      summary: List interviews
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED, FAILED]
        - in: query
          name: candidateId
          schema:
            type: string
          description: Filtr podle ID kandidáta (získejte z Candidates API)
      responses:
        "200":
          description: List of interviews
    post:
      summary: Create interview
      description: Vytvoření pohovoru. Parametr candidateId musí odpovídat existujícímu kandidátovi z Candidates API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidateId]
              properties:
                candidateId:
                  type: string
                  example: CAND-001
                  description: ID kandidáta (získejte z Candidates API)
                position:
                  type: string
                  example: Integration Tester
                scheduledAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Interview was created
        "400":
          description: Unknown candidate
  /rest/interviews/{id}:
    get:
      summary: Get interview detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Interview detail with embedded candidate
        "404":
          description: Interview not found
  /rest/interviews/{id}/status:
    patch:
      summary: Update interview status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED, FAILED]
      responses:
        "200":
          description: Status was updated
  /rest/interviews/{id}/evaluate:
    post:
      summary: Evaluate interview
      description: Ohodnocení pohovoru skóre 0-100. Automaticky nastaví status na COMPLETED a recommendation (HIRE >= 75, REVIEW >= 55, NO_HIRE < 55).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: number
                  minimum: 0
                  maximum: 100
      responses:
        "200":
          description: Interview was evaluated
